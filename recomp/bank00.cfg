# bank00.cfg — ActRaiser (USA)
#
# LoROM, 1MB (32 banks), no coprocessors.
# ROM header at $00:7FC0: "ACTRAISER-USA"
#
# Interrupt vectors from ROM header:
#   Emu RESET: $00:8000
#   Native NMI: $00:8520
#   Native IRQ: $00:8525
#   Native COP: $00:8526
#   Native BRK: $00:852F

bank = 0

# Read SNES vector table from ROM bytes at $00:FFE0-FFFF.
auto_vectors

# Entry points from the vector table.
func ResetHandler 8000
func NmiHandler   8520
func IrqHandler   8525

# VBlank wait loop at $8418 spins on $4210 (RDNMI) bit 7.
# Replace with HLE stub that yields to the host via coroutine swap.
hle_func 8418 ActRaiser_WaitForVblank

# $8966 is a computed-jump CONTINUATION inside the object loop $8915. At $895C
# the code does `LDA #$8965; PHA` then pushes a handler addr and RTS-dispatches
# (jump-table call); the handler's RTS lands at $8966 to finish the loop and hit
# the $896E PLP that restores M (the loop runs m=0 after $8915's REP #$30).
# Because $8966 was only a mid-function block label — not a dispatch entry — the
# handler's RTS-return missed in cpu_dispatch_pc and unwound WITHOUT running the
# PLP, so M stayed 0. That m=0 then mis-dispatched $8465 to its misdecoded
# (BRK) M0X0 variant which never pops its return frame, corrupting $82E2's PLA
# and freezing the action-level fade-in. Declaring $8966 as its own entry makes
# the continuation dispatchable so the PLP runs and M is restored. The loop is
# entered in m=0/x=0 at this site, so force that variant to be emitted.
func bank_00_8966 8966
force_variant_at 8966 0 0

# --- ActRaiser action-stage object-handler set ---------------------------
# The $8915 object loop dispatches each object's per-frame behavior through a
# RAM handler pointer ($895C: LDA $12,X; DEC; PHA; RTS). Data-driven object
# state machine, reached ONLY via that computed RTS-jump; runs at m=0/x=0 (the
# loop REPs #$30 first). entry_mx:0,0 emits the correct M0X0 variant into the
# dispatch table -- else the (0,0) slot is NULL, dispatch misses, the loop is
# abandoned before its $896E PLP, m leaks 0 -> 8465 BRK-misdecode -> freeze.
# (cpu_dispatch_pc_from has a runtime BRA/BRL-follow + graceful loop-resume
# fallback for any handler not registered here, so a straggler degrades to a
# one-frame object skip, never a freeze.)
#
# Discovered statically: (a) LDA #imm16/STA $12 transitions; (b) initial/
# observed handlers; (c) yield-helper continuations ($8623/$A673/$F8A6/$F8D2/
# $F977 store caller-return into $12, so each JSR-to-helper +3 is an entry);
# (d) CLC;ADC #imm;STA $12 advances; (e) per-level handler sub-tables
# ($96AF/$A8F6/$B449/$C11E/$CD9B/$D928/$E722/$F39A via $9557's $95DD dispatch)
# -- each 0xE-byte record start E and its handler slot E+0xC (the handler code
# or its BRA/BRL-to-shared-handler trampoline).
func bank_00_80A5 80A5 entry_mx:0,0
func bank_00_80B1 80B1 entry_mx:0,0
func bank_00_8661 8661 entry_mx:0,0
