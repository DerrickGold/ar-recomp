# NOTE (do NOT re-add): the object-loop continuations $8078 / $82ED must NOT be
# registered as func entries. They are the instruction after a `JSR $8915` inside
# a per-frame loop whose vblank-yield lives BEFORE the JSR; registering the
# continuation splits the loop so the yield is excluded, and the object loop's
# RTS-dispatch ($896F -> continuation) then re-enters the split function every
# frame without unwinding -> unbounded host-stack recursion -> getenv/SIGSEGV
# (confirmed via lldb: bank_00_8078 -> 8915 -> dispatch(0x8078) -> 8078 -> ...).
# The `->0082ed/->0080b4 from 00896f` misses are BENIGN (fallback handles them).
# $82ED is already an internal label of the converted bank_00_82E2; $80B4 works
# only because its whole loop (incl. the yield) was naturally decoded as one fn.

