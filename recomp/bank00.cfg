# === yield-continuation batch (round 3): the $86FA helper family =========
# Death Heim boss-rush soft-lock root cause (2026-07-14). $00:86FA is an
# EIGHTH yield helper the earlier comprehensive scans never knew about:
#   STZ $6,X; STZ $8,X; STA $24,X (A = wait frames); PLA; INC A; STA $12,X; RTS
# i.e. "halt movement, wait N frames, then resume at JSR-site+3 via the $895C
# object-loop dispatch". It was missing from the documented helper list
# ($8623/$A673/$F8A6/$F8D2/$F977), so its continuations were only registered
# where some other pass happened to also reach them — 29 of 31 were, the two
# inside $FE89 were not, and $FE89's $8657 continuation ($FEE6) was missed
# with them ($FE89 is stored as a handler only via spawn-record DATA words
# at $F6D4/F6EC/F704/F71C/F734/F76A + LDA #$FE89 at $F903, so no code-path
# scan ever walked its body).
#
# $FE89 = the Death Heim post-boss teleport-out sequencer (victory driver
# slot's handler after the $A593 flash sequence). Chain:
#   $FE89 (setup, STZ $F4) -> $86FA wait 64 -> $FE9D (beam engulfs player,
#   COP $A0 SFX) -> $8657 -> $FEE6 -> $86FA wait 32 -> $FEEC:
#     $0347 = $19 - 1 (boss-rush progress), then LDA #$0701; STA $1A --
#     the 16-bit store that stages $1A=$01/$1B=$07 = "warp back to 0701",
#     $0334=1 if $19==8 (final-boss flag), dealloc.
# With $FE9D unregistered, the object loop's dispatch missed it EVERY frame
# (silently: the dispatch-miss stderr tripwire gates S>=$0200 and the loop
# runs at S~$01F5) and the graceful fallback skipped the object forever ->
# victory sequence completes, then nothing -> soft-lock. Found via
# AR_WRAM_TRACE: slot-50 h12 A593->FE89->FE9D at f=2513-2514, t24 64->0 at
# f=2578, then zero writes to the slot for 2000+ frames.
# $D8A1/$D8A7 are the same class in kingdom 5's handler web (unhit so far).
func bank_00_D8A1 D8A1 entry_mx:0,0
func bank_00_D8A7 D8A7 entry_mx:0,0
func bank_00_FE9D FE9D entry_mx:0,0
func bank_00_FEE6 FEE6 entry_mx:0,0
