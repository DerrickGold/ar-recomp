# --- $1E,X yield-helper continuations ($8657) ----------------------------
# $8657 (JSR $862A; PLA; STA $1E,X; ...; LDA $1E,X; PHA; RTS) stores the caller's
# JSR-return addr as the object's $1E resume handler and dispatches it ($8668).
# So every 'JSR $8657' continuation (site+3) is a handler entry. Original scan
# only covered the $12,X helpers; these $1E continuations were missed -> $8668
# dispatch-miss -> handler skipped/hang. Found via decoder fixpoint over all
# 'JSR $8657' fall-throughs. Requires the hrv==1 tail-call driving-loop ABI fix
