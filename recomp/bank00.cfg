# Fillmore boss-defeat / act-clear sequence handler. The boss-death object
# (slot ~20, $12=$A1FC) runs this state machine: DEC $24,X counter waits, then
# COP event syscalls + JSR $8623/$873C/$86FA, gated on game-mode $18. Reached
# only via runtime $12 handler-write at boss death, so the static decoder never
# saw it -> unconverted -> dispatch miss -> object frozen -> the act-clear
# transition never fires and the act timer stops counting down. Progresses via
# internal branches (no $12-swap), so this single entry covers the machine.
