# A7A3: the $86FA continuation-yield RESUME point inside A758. A758 runs
# A758..A79D, then `LDA #$012C; JSR $86FA` yields (86FA stores A7A3 into the
# object's $12 handler slot and RTS-returns to the loop). Next frame the loop
# dispatches $12==A7A3 to finish the object (C1B7 gfx regs + 85B7 despawn).
# Without registering A7A3 the dispatch misses -> graceful-fallback skips the
# object's completion -> its half-initialised state feeds the NMI builder
# (ABF0) garbage -> Act 1 freeze ~5s in. Sibling continuations A7BE/A7EB are
# already registered below; A7A3 was simply overlooked.
