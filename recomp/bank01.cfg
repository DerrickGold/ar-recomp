# bank01.cfg — ActRaiser (USA)
#
# Auto-generated minimal config. The recompiler will auto-discover
# functions via cross-bank JSL targets from other banks.

bank = 1

# NOTE: do NOT HLE $01:9284. It LOOKS like the vblank-wait ($8418/$A85E) but is
# NOT byte-identical: PHP / SEP #$20 / PHA / JSL $0192B7 / JSL $01ACD9 / {3-read
# $4210 wait} / PLA / PLP / RTS. The two JSLs are the per-frame menu/mode-7 update
# work; HLE'ing the whole routine SKIPS them -> animation freezes (and the spiral
# never advances). The 1/3-speed pacing must be fixed in the RDNMI token model in
# snes.c (don't burn a host frame on the clear-read and post-read), not by HLE here.

# $01:B8AE jump-table RTS-dispatcher (boss->sim transition setup, called from
# bank_03_B21F). Block $B8AE: PHX; LDA $0E,X; AND #$FF; ASL; TAX;
# LDA $01B8D0,X (handler table); PLX; LDY #$B8C1; PHY; PHA($B8C0); RTS.
# It's a CALL (PHY pushes the return $B8C2 before the PHA'd handler), so each
# handler RTSs back to the in-function continuation $B8C2. Without this the
# recomp emits a generic RTS that can't resolve the computed target -> the
# dispatch host-unwinds with S off by -1 -> B21F's exit PLP reads a shifted
# slot (the "x-leak") -> garbage A087 -> over-pop -> boss->sim HANG. The
# `ret:B8C2` makes it a call-with-return (root-caused 2026-06-26 via AR_STRACE).
#
# 2026-06-30 investigation: table size 16 undercounts the real table (it
# has 27+ entries; only entries 28+ read invalid <$8000 LoROM addresses).
# Object types at index 16-26 (reached once sim mode runs long enough to
# spawn them) hit the emitter's dispatch-OOB fallback, which for this
# PHA/RTS "is_call_ret" idiom leaked the pre-pushed PHY return frame (2
# bytes) every hit -- the act->sim post-boss crash's actual root cause
# (bank_01_B898's own epilogue RTS at $01:B8CF then pops the leaked frame
# as a garbage return -> misdecode -> ADAD PPU-read SIGBUS). Found via
# AR_EXITS. See [[actsim-crash-nlr-fix]] / [[misdecode-detection-toolkit]].
#
# FIX LANDED for the crash itself: codegen.py _emit_indirect_dispatch's
# is_call_ret OOB path now undoes the pre-pushed PHY instead of leaking it
# -- an OOB hit is stack-neutral regardless of table size, so the crash is
# fixed WITHOUT needing the table size correct.
#
# Table size 26 = the real bound (first handler $B904 sits at B8D0+0x34).
# HISTORY: this was deliberately capped at 16 for a while because entries
# like $B92E/$B905/$B90C decode-wandered back into the dispatcher's own
# $B8C0-$B8CF code and lost the `ret:B8C2` label ("undeclared label
# L_B8C2_*" build errors). That failure class was fixed generally in
# cfg.py `_identify_leaders` (2026-07-02, the F5BE arc) -- successors of
# ANY multi-successor insn are now promoted to block leaders -- and all
# 26 entries + the dispatcher emit clean under the direct emit_function
# harness. The cap was load-bearing for the SIM-MODE actor bug: town
# actor records use types 0x12/0x13 (18/19 > 16), so their per-type class
# handlers ($B9EC/$BE4F -> the D04E state machines -> the spawn battery
# $BA23-$C793 -> $D072) fell into the OOB-skip default every frame and
# records 2-5 never initialized (corrupt sprites). See DEBUG.md #25.
# idx:A NOT idx:X (2026-07-02, dump19 root cause): the ROM wraps the table
# read in PHX..PLX ($B8AE PHX / $B8BB PLX), so by the PHA/RTS dispatch at
# $B8C0 the X register has been RESTORED to the record pointer (e.g.
# $0B30). The idx:X emitter keys its switch on `cpu->X / 2` AT the
# dispatch site -> _idx = 0x598 -> OOB-skip on EVERY typed record, since
# the day this directive was written. idx:A keys on the PHA'd table WORD
# (immune to the PLX) -- the same value-keyed form as F5BE's F5DF.
indirect_dispatch B8C0 26 idx:A tables:B8D0 ret:B8C2

# Town-actor SCRIPT-COMMAND dispatch $01:CD5E (2026-07-04). Root cause of the
# missing town people (dev path-walkers AND church-cutscene pair — same actor
# system). The per-frame actor handler $01:CD35 reads one animation-script byte
# via CFC7 (from $7F:xxxx), and for a non-$7F byte dispatches on it:
#   $CD5E LDY #$CD6B; PHY; PHX; ASL; TAX; LDA $01CD6F,X; PLX; PHA; RTS($CD6B)
# = jump to table[byte]+1 (18 handlers $CD93..$CEE5 at $CD6F), return to
# $CD6C (BRL $AC70). Byte 3's handler $CDCC does `LDA #$10; STA $001E,X`
# (the $0E20 walk counter) + `LDA #$3; STA $0012,X` (behavior state=3 = the
# PACED walk via CEFA). None of the 18 handlers were decoded (find_rts_webs.py
# flagged `PHA;RTS @01:cd6b` UNCOVERED; 0 emitted blocks for $CDCC etc.), so
# the dispatch silently no-op'd: the actor stayed in state 1 (unpaced CD35),
# raced its walk script ~17x too fast, development "completed" in ~22 frames
# instead of ~238, and the people were hidden before visibly walking. Proven
# via AR_SIMWALK: recomp reads bytes 3,E,FE,2,... (identical script data to the
# oracle) but never writes state=3. Same idx:A/PHX-PLX/ret shape as B8C0 (X is
# the record ptr at the PHA, so idx:A keys on the PHA'd handler word). Table has
# 18 valid entries then $A961/$FFFF; count 18. PHA @$CD6A, RTS @$CD6B, ret $CD6C.
indirect_dispatch CD6A 18 idx:A tables:CD6F ret:CD6C

# $01:B898 prologue is PHP;PHB;REP #$20;... -- it normalizes m immediately
# but never touches x, so x is live-in from the caller and m is not. B898
# has no cfg entry (auto-promoted), so its cfg-declared canonical width
# defaulted to the SNES-reset (1,1) guess in the emit-truth prune's
# routing fallback -- wrong for this function specifically: AR_MXHIST
# ground truth shows M0X0 dominates real execution (682 hits) vs M1X0's 1,
# so (0,0) is the actual reachable/valid width, not (1,1). Without this,
# the M1X0 dispatch case (all ~39 call sites across the ROM, e.g.
# bank_01_933C's call at $019341) gets pruned and rerouted to M1X1 --
# entering with the caller's real x=0 but the M1X1 body's assumed x=1,
# misdecoding the first x-sensitive immediate load and cascading into the
# post-boss/angel-sequence graphics corruption. entry_mx:0,0 pins the
# correct canonical so every call site routes to the real M0X0 body
# instead of guessing. Root-caused 2026-07-01 via AR_MXCHECK/AR_MXHIST/
# AR_CALLMX + real backtrace capture (AR_MXCHECK_BT). See
# [[actsim-crash-nlr-fix]] / [[misdecode-detection-toolkit]].
func bank_01_B898 B898 entry_mx:0,0

# ── Sim-mode actor-behavior dispatch targets (2026-07-02) ────────────────────
# Root cause of the sim-mode corrupt-graphics/freeze: the actor-record
# behavior dispatcher $01:D04E ends in a PHA/RTS jump ($01:D062 = the RTS,
# the dispatch-log "source 01D062") whose targets come from per-caller
# handler tables. The table pointer is passed in Y by each caller (LDY
# #table; JSR/BRL $D04E), selector = record.+12 & $7FFF, entry word+1 =
# handler. 24 call sites, 24 inline tables — including the per-type actor
# SPAWN battery ($BA23-$C793 region, tables B9F8/BE58/C243/C505), which is
# what populates record +00/+02/+04 script ptrs and +08 sprite ptrs via
# $01:D072/$D0F5. None of these targets were decoded as functions, so the
# runtime dispatch trampoline logged found=0 and the graceful-fallback
# skipped them every frame: records got their TYPE fields (via the
# $03:813F staging copy — byte-identical to the oracle) but never their
# position/sprite/script init -> 4 permanently-garbage town actors.
# Runtime dispatch resolution already works (dispatch log computed the
# right pc24s); registering the targets is the whole fix. All dispatched
# with m=0 x=0 (dispatch_log mx:0), hence entry_mx:0,0.
# Tables (site -> table): B243->B246 B420->B423 B908->B90B B931->B934
#   B962->B965 B9EF->B9F8 BE52->BE58 C1C3->C1C9 C23A->C243 C4FC->C505
#   C7C2->C7C5 C883->C886 C8AD->C8B0 C8D0->C8D3 C8F4->C8F7 C939->C93C
#   C974->C977 C99A->C99D CA6A->CA6D CA95->CA98 CAC0->CAC3 CC3B->CC3E
#   CCDD->CCE0 CD0F->CD12
func bank_01_B252 B252 entry_mx:0,0
