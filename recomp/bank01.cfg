# Round 2 (2026-07-02, dump17): registering the D04E targets exposed the next
# layer — the handlers RUN now, but several are reached through TAIL dispatch
# (`LDY #table; BRL $D04E` inside a helper the game JSRs), so the handler's
# terminating RTS pops the JSR-return of the OUTER caller (e.g. `JSR $B41A`
# inside $01:B21B -> ret $B22A). Those mid-caller continuations aren't
# function entries -> dispatch-miss (dump17 dispatch_log: 01B429->01B22A,
# 01B2DE->01B227) -> host-unwind DROPPED the rest of the actor tick,
# including the battery init. Enumerated systematically: every `JSR <fn>`
# site in bank01 whose target is a D04E-family handler or tail-helper
# (B23B/B41A), return = site+3:
func bank_01_B227 B227 entry_mx:0,0
func bank_01_B22A B22A entry_mx:0,0
func bank_01_C82A C82A entry_mx:0,0
