# bank03.cfg — ActRaiser (USA)
#
# Auto-generated minimal config. The recompiler will auto-discover
# functions via cross-bank JSL targets from other banks.

bank = 3

# Act->sim transition crash fix (2026-06-25). $03:9156 is a stack-relocating
# RTS-trick dispatcher: it relocates S to $1FFF, builds an RTS-chain of
# CONTINUATION addresses on the stack ($9B14 LDY #$9B21;PHY -> RTS target $9B22;
# $9B3B LDY #$9B49;PHY -> RTS target $9B4A), and threads through them via
# SEP #$20; RTS at $9B59. These targets are intra-function labels the static
# decoder never sees (computed pushes), so the recomp's trampoline RTS-dispatch
# (cpu_dispatch_pc_from) can't resolve $9B22 -> returns NORMAL -> host-unwinds to
# the lexical caller $03:8053 at $80B6 carrying the chain's transient m=1 (which
# the chain would have REP'd back to m=0). $80B6 then JSR $AC8E (m=0 code) at m=1
# -> runs the garbage M1X0 variant (CMP #$0004 misdecoded as CMP #$04 + BRK) ->
# stack underflow -> $2133 PPU scribble -> abort. Confirmed via AR_RTSLOG=0x039b59
# FIX = in-function RTS-trick dispatch (the `rts_dispatch` directive).
#
# The RTS at $9B59 pops one of three runtime-pushed continuation addresses and
# jumps to it+1:
#   $9B22 / $9B4A : intermediate chain continuations ($9B14 LDY #$9B21;PHY,
#                   $9B3B LDY #$9B49;PHY). Threaded while the chain is consumed.
#   $9195         : the TERMINAL exit + m-restore ($917A LDA #$9194;PHA ->
#                   $9194+1=$9195, whose first op is `REP #$20`, m=1 -> m=0).
#
# Registering these as standalone `func`s (the earlier attempt) resolved the
# dispatch but BROKE the hand-rolled stack accounting across the function
# boundary -> S over-popped to $2001 -> garbage RTS targets -> B90D m-misdecode
# watchdog hang. `rts_dispatch` instead decodes the three targets as blocks
# INSIDE bank_03_9156 and emits the RTS as a `switch(popped+1){ case T: goto
# L_T; }` that preserves cpu->S across the whole chain. The targets decode at
# the RTS's (m,x)=(1,0); $9195's REP restores m=0 and its own terminal RTS (via
# the $7D1B-restored original stack) returns to $03:8053:$80B6 at m=0, so the
# function's exit-mx analysis sees the true m=0 exit. See decoder.py /
# emit_function.py rts_dispatch handling + docs/SEAMS.md / DEBUG.md.
rts_dispatch 9B59 9B22 9B4A 9195
