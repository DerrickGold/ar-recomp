bank = 3

# Act->sim transition crash fix (2026-06-25). $03:9156 is a stack-relocating
# RTS-trick dispatcher: it relocates S to $1FFF, builds an RTS-chain of
# CONTINUATION addresses on the stack ($9B14 LDY #$9B21;PHY -> RTS target $9B22;
# $9B3B LDY #$9B49;PHY -> RTS target $9B4A), and threads through them via
# SEP #$20; RTS at $9B59. These targets are intra-function labels the static
# decoder never sees (computed pushes), so the recomp's trampoline RTS-dispatch
# (cpu_dispatch_pc_from) can't resolve $9B22 -> returns NORMAL -> host-unwinds to
# the lexical caller $03:8053 at $80B6 carrying the chain's transient m=1 (which
# the chain would have REP'd back to m=0). $80B6 then JSR $AC8E (m=0 code) at m=1
# -> runs the garbage M1X0 variant (CMP #$0004 misdecoded as CMP #$04 + BRK) ->
# stack underflow -> $2133 PPU scribble -> abort. Confirmed via AR_RTSLOG=0x039b59
# FIX = in-function RTS-trick dispatch (the `rts_dispatch` directive).
#
# The RTS at $9B59 pops one of three runtime-pushed continuation addresses and
# jumps to it+1:
#   $9B22 / $9B4A : intermediate chain continuations ($9B14 LDY #$9B21;PHY,
#                   $9B3B LDY #$9B49;PHY). Threaded while the chain is consumed.
#   $9195         : the TERMINAL exit + m-restore ($917A LDA #$9194;PHA ->
#                   $9194+1=$9195, whose first op is `REP #$20`, m=1 -> m=0).
#
# Registering these as standalone `func`s (the earlier attempt) resolved the
# dispatch but BROKE the hand-rolled stack accounting across the function
# boundary -> S over-popped to $2001 -> garbage RTS targets -> B90D m-misdecode
# watchdog hang. `rts_dispatch` instead decodes the three targets as blocks
# INSIDE bank_03_9156 and emits the RTS as a `switch(popped+1){ case T: goto
# L_T; }` that preserves cpu->S across the whole chain. The targets decode at
# the RTS's (m,x)=(1,0); $9195's REP restores m=0 and its own terminal RTS (via
# the $7D1B-restored original stack) returns to $03:8053:$80B6 at m=0, so the
# function's exit-mx analysis sees the true m=0 exit. See decoder.py /
# emit_function.py rts_dispatch handling + docs/SEAMS.md / DEBUG.md.
rts_dispatch 9B59 9B22 9B4A 9195

# 2026-06-30: act->sim post-boss crash ROOT CAUSE (proven via on-crash dispatch
# ring). $9156 has TWO static exit paths at different m: the $9195 terminal
# (REP #$20 -> m=0, the path runtime ALWAYS takes) and the $9B59 rts_dispatch
# `default` case (generic host-return right after its SEP #$20 -> m=1, the
# never-taken unregistered-target path; AR_RTSDISP_MISS confirms it never fires).
# The exit-mx auto-router sees the ambiguity and can't infer a single exit, so
# the decoder settles on m=1 and decodes the caller $03:8053's fall-through
# ($80B6 onward, in bank_03_8053_M1X0) at m=1. That turns $80F6 `A9 00 60` from
# the real m=0 `LDA #$6000` into m=1 `LDA #$00` + a PHANTOM `RTS` at $80F8 -> the
# phantom RTS pops non-return bytes -> dispatches to garbage ($03:2701) ->
# bank_01_ADAD reads the $2100-$2133 PPU block (open-bus) -> SIGBUS.
# FIX: pin $9156's exit to the true runtime value (m=0,x=0). x=0 is safe — the
# x=1 variants are garbage (bank_03_9156_M0X1 traps: split-immediate BRK at
# $9165), so $9156 is only ever legitimately entered x=0, and $9195's REP #$20
# preserves x. This is exactly the "ambiguous non-leaf SEP/RTS dispatcher needs
# a manual hint" case the exit_mx_at directive exists for.
# See [[actsim-crash-nlr-fix]] (NLR S-drift fix DISPROVED — this is exit-mx, not
# stack drift) / player-invisible-b127-misdecode / decoder.py exit-mx handling.
exit_mx_at 039156 0 0

# 2026-07-22: destroyed-house "sad bubble" NEVER CLEARS (runs/20260722-084641,
# structrec.jsonl: Fillmore recs 6 and 11 enter action=7 at f=9473/9926 and stay
# flags=$80 forever; a rebuilt house lands on the same cell -> bubble on top of
# a standing house). Both structure-record FREE handlers lost their store:
#   $A44F (action 7, destroy)  ... JSR $9FCD ; $A46A LDA $0002,X / AND #$40 /
#                                  BEQ / LDA #$00 / STA $0002,X / RTS
#   $A477 (sibling)            ... JSR $9FE4 ; $A492 LDA #$00 / STA $0002,X / RTS
# Both continuations are m=1, but the decoder resumed them at m=0 because it
# could not infer the callees' exit width. At m=0 the immediates swallow the
# following opcode:
#   $A46A raw `bd 02 00 29 40 f0 00 a9 00 9d 02 00 60`
#         m=1: LDA $0002,X / AND #$40 / BEQ +0 / LDA #$00 / STA $0002,X / RTS
#         m=0: LDA $0002,X / AND #$F040 / BRK / BRK / COP / RTS   <-- no STA
#   $A492 raw `a9 00 9d 02 00 60`
#         m=1: LDA #$00 / STA $0002,X / RTS
#         m=0: LDA #$9D00 / COP / RTS                             <-- no STA
# `STA $0002,X` zeroes the record's flags byte = frees the slot, so the emitted
# handlers can NEVER free a record. Provable from src/gen alone (blocks
# L_A46A_M0X0 / L_A492_M0X0 emit brk/cop hooks and no store).
# $9FCD/$9FE4 are width-neutral (PHX/PHA ... PLA/PLX/RTS) and each has EXACTLY
# ONE caller — $A467 and $A48F, both reached via `JSR $A4F7 ; LDA #$08` at m=1 —
# so pinning their exit to 1,0 is unambiguous.
exit_mx_at 039FCD 1 0
exit_mx_at 039FE4 1 0

# 2026-07-05: sim-mode LAIR-SEAL graphics corruption — an unregistered RTS-trick
# CONTINUATION target (NOT an exit-mx issue — an earlier `exit_mx_at 039D4D 0 0`
# guess was inert and removed). Sealing a lair garbled a broad set of shared BG1
# tiles (map edges, trees, river, lair, text-box borders).
#
# Mechanism (proven via AR_TRACE `dispmiss` channel, one run:
#   `DISPATCH-MISS 03A590 -> 039D8E (RTS-trick/unregistered target)`):
# $03:9D4D is a table dispatcher — `LDX $7BFB; LDA $03DC74,X; TAX; SEP #$20`
# (m->1), then a loop from $9D5A: `LDA $0002,X; BPL $9D8E` (positive entry ->
# loop-continue) else a case that does `LDY #$9D8D; PHY; BRL <handler @ $9Fxx>`
# — i.e. PUSH RETURN ADDRESS $9D8D, branch to a handler (reaching $A4F7); the
# handler RTSes back to **$9D8E** to resume the loop, which after $7BE7==$80
# does `REP #$20; RTS` at $9D9C/E and returns **m=0** to $8053. The decoder
# mis-read the `BRL`->$A4F7 as a "tail-call past end", so the handler's RTS to
# $9D8E hit no registered entry -> host-unwind -> returned to $8053 at m=1. That
# made $8053's tilemap-upload setup at $80C9 (`A9 00 60` = LDA #$6000; STA $2116)
# run at m=1 -> LDA loads only $00 -> VMADD=$0000 not $6000 -> the $8100 loop
# uploaded the town tilemap's tile-INDICES into BG1 char VRAM $0000
# (bgTileAdr=$0500) = garbage tiles. ROM decode confirms $80C9 is coherent ONLY
# at m=0, so hardware's 9D4D loop MUST complete to its m=0 RTS.
#
# FIX: register the pushed continuation $9D8E as a dispatch target at the width
# it runs (m=1 after 9D4D's SEP, x=0). Then the handler RTS resumes the loop and
# returns m=0. (DEBUG.md golden rule: `[dispatch-miss]` -> register the popped
# target as a cfg `func`.) See DEBUG.md §7.15.
func bank_03_9D8E 9D8E entry_mx:1,0

