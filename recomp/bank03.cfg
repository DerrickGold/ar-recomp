# ⚠️ 2026-07-19: DO NOT add A0D2 (or other $9EF4-popped page-A0 values) here.
# TRIED AND REVERTED the same day. Chasing a stuck looping SFX on sim entry,
# $9EF4's RTS was seen popping $A0D2 163x (hf 492..758, runs/20260719-070637)
# -> default -> benign host-unwind. resolve_miss rated it [SAFE] ("single-shot,
# 29 insn(s) to RTS at 03:A119, table evidence handler-1@03:A0CC") and proposed
# registering it. Adding `A0D2` to this line DISPROVED that:
#   - the $A0D2 miss vanished, but 357 NEW misses appeared sourced at $03A119
#     (its own exit RTS) with GARBAGE targets $0006/$000A/$000C/$000D
#     (+ $4A06/$4A0A/$4A0C/$4A0D), first at hf 492 — the same onset frame;
#   - the bank_01_B1B7 garbage-variant and $8193 leak rates were UNCHANGED
#     per-frame (0.212 -> 0.208), so it fixed nothing;
#   - new/incorrect sound effects became audible in play.
# ROOT (settled 2026-07-19 by raw ROM bytes + AR_RTSDISP_MISS + AR_STRACE):
# $A0D1 IS THE JUMP-TABLE BASE, not a return address. $9ED3 indexes it:
#   X = $A0D1 + (record_type & 0x0F)*2 ; LDA $03:0000,X = handler-1
#   [$A0D1]=$A0E0 -> $A0E1   [$A0D3]=$A119 -> $A11A   [$A0D5]=$A11D -> $A11E
#   [$A0D7]=$A123 -> $A124   [$A0D9]=$A13D -> $A13E   [$A0DB]=$A143 -> $A144
#   [$A0DD]=$A156 -> $A157   [$A0DF]=$A476 -> $A477
# — exactly the handlers on the `rts_dispatch 9EF3` line above, and exactly the
# ones observed executing at runtime ($A0E1, $A11A). So $A0D2 is table BYTES;
# "resuming" there executes the jump table as code.
# (dis65 shows a plausible-looking `LDY #$A119` there — that is table data
# decoded as an instruction. ALWAYS dump raw bytes before believing a decode
# of a dispatch target.) Registering it made the engine EXECUTE A JUMP TABLE.
#
# Why $9EF4 pops it: the shared dispatcher $9ED3 is stack-balanced BY DESIGN —
#   $9ED6 PHY            ; push table pointer ($A0D1) as SCRATCH
#   $9EE1 ADC $01,S      ; read it back off the stack to index the table
#   $9EE4 PLA            ; pop it again (balances the PHY)
#   $9EE5 LDA #$9EF3 / PHA ; handler-return continuation
#   $9EE9 LDA $03:0000,X / PHA ; handler address from the table
#   $9EF3 RTS            ; -> handler ; handler RTS -> $9EF4 -> RTS -> caller
# So $A0D1 is SCRATCH, never a continuation. $9EF4 popping it means the PLA at
# $9EE4 did not take effect and the scratch word is stranded. The defect is in
# how that PHY/ADC $01,S/PLA trio survives recompilation — an ENGINE/gen issue.
# NO cfg line can fix it: all 7 `LDY #imm ; BRL $9ED3` sites in bank 03 push
# TABLE addresses (resume values A018 A0D2 A1A2 A23E A29D A2F6 A365) — none of
# them is a code continuation, so none may ever be registered.
#
# LESSON (new, beyond the B8C2 nested-reentry and §7.17 paired-resume classes):
# resolve_miss's [SAFE] verdict certifies SHAPE only (target decodes as a
# single-shot run to its own RTS) — and a data table can satisfy that by
# accident. It does NOT prove the popped value was a genuine pushed
# continuation. When a "safe" registration produces fresh misses sourced at the
# newly-registered target's OWN exit RTS, that is the signature of a bogus
# popped value — revert, don't chase deeper.
rts_dispatch 9EF4 9E32 9EC5

# Multi-actor cutscene web, bank-3 side (2026-07-07, DEBUG.md §7.17 / dump14).
# ⚠️ 80B3/80BF REVERTED same day — the DOUBLE-EXECUTION class, a NEW cfg lesson
# beyond B8C2: NEVER register a MID-FUNCTION JSR-return continuation of a
# PAIRED host-C caller. $8053 calls $9CFB/$9D4D at $80B0/$80BC as paired C
# calls; the emitted call site restores S (cpu->S = _call_s) after the nested
# chain returns NORMAL and FALLS THROUGH, re-executing the frame tail
# (JSR $BB94/$89F0/JSL $B90D = the whole sim actor tick) a SECOND time ->
# enemies/animations at 2x speed, spawn state machines double-stepped
# (spawn-anim stall; a Fillmore lair stopped spawning). The old miss at
# $9D4C/$9D9E->$80B3/$80BF is the BENIGN shape: the engine's Not-found path
# unwinds and the paired caller resumes naturally, exactly once.
# Registration is safe ONLY for (a) TAIL dispatch, where the containing fn
# ENDS at the dispatch RTS (reward web $9C82), or (b) dispatch-only entries
# no C code falls into (9D8E-class loop resumes, CA7A/CDAD coroutine slots).
# func bank_03_80B3 80B3 entry_mx:0,0   # POISON — double frame tail, do not re-add
# func bank_03_80BF 80BF entry_mx:0,0   # POISON — double frame tail, do not re-add
# 8270 (`$826D JSR $E092; RTS` return) and 86FC (`JSR $86FD; RTS` return) are
# ALSO removed: a dispatched bare-RTS frame is unbalanced at entry, so its RTS
# re-pops and re-dispatches the OUTER return nested — same double, one level up.
# func bank_03_8270 8270 entry_mx:0,0   # POISON — double one level up
# func bank_03_86FC 86FC entry_mx:0,0   # POISON — double one level up
# CA7A/CDAD = a coroutine yield pair through resume-slot $9220 ($CA83 stores
# #$CA79; $CDAC does LDA #$CDAC; PHA; LDA $9220; PHA; RTS) — dispatch-only
# resumes (no paired C site falls through into them), same safe class as $9D8E.
func bank_03_CA7A CA7A entry_mx:0,0
func bank_03_CDAD CDAD entry_mx:0,0
