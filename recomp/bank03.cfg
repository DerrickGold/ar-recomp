# Development BUILD-STEP dispatch web (2026-07-04, round 2 — found via the
# 1000-block garbage-trap ring after the $9390-family fix): $03:9DE4/$9E5A
# scan development records and dispatch per-record via pushed continuation
# ($9E31/$9EC4) + BRL to one of 7 outer handlers ($A011/$A0CB/$A19B/$A237/
# $A296/$A2EF/$A35E), each `LDY #table; BRL $9ED3`. $9ED3 then dispatches
# AGAIN through the per-type table (8 words each, 7 tables, 49 unique
# targets) via `PHA #$9EF3; PHA table-word; RTS` at $9EF3. None of it was
# statically visible -> the $9EF3 dispatch popped an unregistered target ->
# silent RTS-follow unwound the WHOLE 9DE4 scan at m=1 (SEP at $9EEE) ->
# m=1 leaked into the $8193 master loop (B97F/B1B7 garbage variants,
# corrupt/misplaced tiles) AND the build-step side effects never ran
# (missing people/houses). Chain mapping:
#   $9EF3 RTS -> per-type build-step handler (49 targets, m=1 x=0)
#   handler exit RTS -> $9EF4 (blanket-mapped over every $60 byte in
#     $9EF5-$A4C8; the popped-value guard makes a false site or a plain
#     subroutine return fall through to a normal return, so over-listing
#     is safe — under-listing silently skips a build step)
#   $9EF4 RTS -> $9E32 (9DE4 loop) / $9EC5 (9E5A loop)
#
# Round 3 (2026-07-04, dump13 + deep-ring): a THIRD sibling scanner,
# $03:9CFB/$9D4D (called from $8053's construction-scene sequence at
# $80B0), same shape: push continuation $9D3B/$9D8D, BRL to 7 handlers
# ($9F1A/$9F27/$9F3F/$9F4C/$9F59/$9F66/$9F73) living in the SAME
# $9F1A-$A010 region as the round-2 web. Their exit RTSes (e.g. $A003)
# popped $9D3B -> unmapped -> silent unwind out of $9CFB at m=1 (SEP at
# $9D03 open) -> $8053 continued at m=1 -> JSR $9156 entered as the
# M1X0 GARBAGE variant -> the whole construction scene (96EF/9710/AC8E/
# 97B0 M1X1 cascade) died -> COP $9C never posted, worker/people sprites
# never drawn. Fix: the blanket lines below carry THREE guarded targets
# (9EF4 / 9D3C / 9D8E) — the popped word disambiguates which scanner's
# continuation to resume. LESSON: in AR_RTSDISP_MISS output, a popped
# target with no matching JSR at target-3 is a REAL missing continuation
