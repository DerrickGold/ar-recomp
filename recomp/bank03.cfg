# 2026-07-02: sim-mode town HANDLER SUBSYSTEM silently dead (graphics corruption
# + freeze investigation, DEBUG.md #22). $03:F5BE is the per-frame per-town
# handler dispatcher, called from the sim master loop $03:8193 (L_81D7):
#   PHP; PHB; REP #$20; LDA #$007F; JSL $008519      ; DB=$7F
#   LDX $7BFB                                         ; town index * 2
#   LDA $03F5ED,X; TAX                                ; X = per-town list ptr
#   loop: LDA $030000,X; CMP #$FFFF; BEQ exit
#         PHX; LDY #$F5E2; PHY; PHA; SEP #$20; RTS    ; RTS-trick CALL handler
#   $F5E3: REP #$20; PLX; INX; INX; BRA loop          ; handler returns here
#   exit: PLB; PLP; RTS
# Outer table $03:F5ED = 6 towns (Fillmore..Northwall); inner lists are packed
# at $03:F5F9-$F620 (20 words: 14 unique handler-1 values + 6 $FFFF
# terminators); handler code starts at $F621/$F671/$F68A/... — the town
# lair/event logic (tests+maintains the $7E:91xx lair masks via $03:F46E/F479
# with the $DCA2/$DCAE pointer tables). Without this directive the decoder
# folds the push-push-SEP-RTS into F5BE's function exit: NO handler ever runs
# (an entire town subsystem dead) and the SEP #$20 leaks m=1 to the caller
# (the recurring [call-mx] at $0381EB, caught by the call-mx block-ring dump).
# idx:A = value-keyed switch on the PHA'd handler-1 word (X here is an
# absolute ROM pointer, not a table index, so the idx:X form can't express
# it); sep:20 = the SEP #$20 between PHA and RTS (handlers genuinely enter
# m=1 x=0 — their immediates only disassemble sanely at m=1); ret:F5E3 = the
# in-function continuation each handler RTSes back to (PHY'd $F5E2 + 1).
# Same idiom family as bank01.cfg's `indirect_dispatch B8C0 ... ret:B8C2`.
indirect_dispatch F5DF 20 idx:A tables:F5F9 ret:F5E3 sep:20

