# bank02.cfg — ActRaiser (USA)
#
# Auto-generated minimal config. The recompiler will auto-discover
# functions via cross-bank JSL targets from other banks.

bank = 2

# SPC700 upload routine at $02:9A56.
# Loops on $2140 waiting for APU handshake (0xBBAA), then uploads
# data blocks through the IPL protocol. Replace with framework HLE.
hle_spc_upload 9964
hle_spc_upload 9A56

# VBlank wait subroutine at $02:A85E — identical pattern to $00:8418
# (PHP/SEP/PHA, spin on $4210 bit 7, PLA/PLP/RTS). Used during the
# intro sequence. Must yield to the host so frames are drawn and the
# NMI handler runs each frame; otherwise it busy-spins forever.
hle_func A85E ActRaiser_WaitForVblank

# Tile-animation frame scheduler at $02:BC56. During a force-blanked scene
# load, the recomp's main coroutine can wait several host frames for the SPC
# $F0 acknowledgement while NMI keeps running. Native BC56 then arms a DMA
# from the not-yet-captured $7F:B800 page, erasing VRAM $0000 before $BAF5
# captures the animation frames. The HLE faithfully reproduces BC56 but
# defers invisible animation ticks while INIDISP force-blank is set.
hle_func BC56 ActRaiser_TileAnimationTick

# --- $02:AA9C = the ENDING/CREDITS presenter (found 2026-07-14) ------------
# Mode $18=$08 (the ending, entered after the post-final-boss $19=09
# world-montage) is started by the bank-0 fade routine's special case at
# $00:82C3: `LDA $18; CMP #$08; BNE ...; LDA #$02; PHA; LDX #$AA9B; PHX; RTL`
# — a hand-rolled cross-bank RTL long-jump (the JSL-less sibling of the
# PHA;RTS trick; the only site of this byte shape in bank 0). $02:AA9C was
# completely unconverted (no func, no label), so the dispatch missed and
# host-unwound PAST the whole ending: the game sat alive in mode 8 with only
# NMI frames running and no credits (runs/20260714-184728, dispmiss
# `from 0082D0 to 02AA9C` at hf=47576).
# The routine relocates S to $01FF (never returns -> registration is the
# dispatch-only/tail-jump class, no paired-resume hazard), walks a 17-entry
# sequence via JSR $AB30, checks $0349, and stamps 'A','C','T' into SRAM
# $70:1FF0-1FF2 (the beat-the-game save marker). Site executes at m=1,x=0
# (first insn REP #$20 -> m=0). Its JSR callees ($AB30 etc.) auto-promote
# through the regen closure.
func bank_02_AA9C AA9C entry_mx:1,0
