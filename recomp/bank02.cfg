# bank02.cfg — ActRaiser (USA)
#
# Auto-generated minimal config. The recompiler will auto-discover
# functions via cross-bank JSL targets from other banks.

bank = 2

# SPC700 upload routine at $02:9A56.
# Loops on $2140 waiting for APU handshake (0xBBAA), then uploads
# data blocks through the IPL protocol. Replace with framework HLE.
hle_spc_upload 9964
hle_spc_upload 9A56

# VBlank wait subroutine at $02:A85E — identical pattern to $00:8418
# (PHP/SEP/PHA, spin on $4210 bit 7, PLA/PLP/RTS). Used during the
# intro sequence. Must yield to the host so frames are drawn and the
# NMI handler runs each frame; otherwise it busy-spins forever.
hle_func A85E ActRaiser_WaitForVblank
