# HD graphics replacement manifest.
#
# This tracked file is a TEMPLATE: every known replacement hook ships
# commented out. To use one, uncomment its [replace:<name>] block and drop
# your art file next to this manifest (art files are gitignored — bring your
# own). The game picks changes up on the next launch; the hd_replacements
# setting (AR_HD_REPLACEMENTS) toggles the whole system live.
#
# Each entry swaps one graphic using a declared "plane":
#   screen  host-overlay substitution of a screen-locked, untransformed
#           graphic (menus, logos, HUD-like elements) — supported today
#   mode7   canvas-space texture override sampled through the Mode-7 matrix
#           (reserved; needs the engine override hook)
#   tiles   hash-keyed HD tile pack (reserved; needs the N-x renderer path)
#
# Keys (screen plane):
#   layer      bg1 | bg2 | bg3 | bg4 | obj
#   rect       x0,y0,x1,y1 in authentic screen space (x1/y1 exclusive)
#   image      art file, relative to this manifest; alpha honored; any
#              resolution (it scales to the output viewport, not to 256px)
#   when       comma-separated gate, ALL must hold. Operands:
#              wram[<hex addr>] byte, mode (BG mode), m7a-m7d (matrix
#              elements), m7==identity. Operators == and !=; values use
#              0x for hex.
#   brightness 1 (default) follows INIDISP master brightness; 0 draws as-is
#
# Missing images leave an entry inert (authentic rendering falls back).
# Deriving a new hook's gate: run with AR_TITLELOG=1 (or check
# docs/rendering-engine.md §13.1.1) to see the per-frame PPU state.

# -- Title-screen logo ---------------------------------------------------
# The logo/medallion/TM block. The whole title is one Mode-7 BG1 canvas;
# the gate waits for the intro swirl's per-scanline HDMA matrix animation
# to land on the identity matrix, so the swirl itself stays authentic and
# the HD art takes over on the settled frame. Menu text (y>=140) is outside
# the rect and never captured. Art aspect should be ~2.9:1 (the rect's
# display-space shape under the 7:6 CRT pixel stretch).
#
#[replace:title-logo]
#plane = screen
#layer = bg1
#rect = 11,27,248,122
#image = title-logo.png
#when = wram[0018]==0x00, wram[0019]==0x00, mode==7, m7==identity
