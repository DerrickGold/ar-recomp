# Asset replacement manifest (HD graphics + music).
#
# Every known replacement hook ships ACTIVE in this tracked file, but an
# entry only engages when its asset file exists at the path it names (assets
# are gitignored — bring your own). Drop a file with the matching name and
# it appears on the next launch; no ini editing needed. A missing asset is
# silently inert (authentic rendering/audio); the console logs one summary
# line per system ("[hd-manifest] N entries, M with art" /
# "[music-manifest] N entries, M with audio") plus a line per loaded asset,
# so a typo'd filename shows up as an asset that never lists. The
# hd_replacements setting (AR_HD_REPLACEMENTS) toggles graphics live; the
# music_replacements setting (AR_MUSIC_REPLACEMENTS) toggles music live.
#
# Asset paths are relative to this manifest: graphics in hd/, music in
# audio/.
#
# ── Graphics: [replace:<name>] ─────────────────────────────────────────────
# Each entry swaps one graphic using a declared "plane":
#   screen  host-overlay substitution of a screen-locked, untransformed
#           graphic (menus, logos, HUD-like elements)
#   mode7   canvas-space texture override rendered through the live Mode-7
#           matrix — rotation, zoom, and per-scanline HDMA warps apply to
#           the HD art (supersampled 4x)
#   tiles   hash-keyed HD tile pack (reserved; needs the N-x renderer path)
#
# Keys:
#   layer       (screen) bg1 | bg2 | bg3 | bg4 | obj
#   rect        (screen) x0,y0,x1,y1 in authentic screen space (exclusive)
#   canvas_rect (mode7) x0,y0,x1,y1 in Mode-7 canvas pixels (0-1024,
#               exclusive) that the art maps onto; dump the canvas with
#               AR_M7_DUMP=1 to locate/paint it
#   wrap        (mode7) 0 (default): substitute only the primary canvas
#               instance — zoomed-out wrapped repetitions keep the game's
#               authentic faint sampling. 1: substitute every repetition,
#               for canvases that genuinely tile.
#   image       art file, relative to this manifest; alpha honored; any
#               resolution (it scales to the output viewport, not to 256px)
#   when        comma-separated gate, ALL must hold. Operands:
#               wram[<hex addr>] byte, mode (BG mode), m7a-m7d (matrix
#               elements), m7==identity. Operators == and !=; values use
#               0x for hex.
#   brightness  (screen) 1 (default) follows INIDISP master brightness;
#               0 draws as-is. mode7 always follows brightness.
#
# Deriving a new hook: press F3 and click the graphic. The scene inspector
# pauses the frame and prints its BG/OAM/Mode-7 identity, VRAM addresses,
# census-compatible tile hashes, and a starter `when` gate/canvas rect. Use
# AR_TITLELOG=1 for the title's per-frame transition state, or see
# docs/rendering-engine.md §13.1.1 for backend constraints.
#
# ── Music: [music:<name>] ──────────────────────────────────────────────────
# Streams an OGG Vorbis file in place of an SPC-driver song. The song is
# identified by the ROM address its SPC image is uploaded from (logged by
# AR_APULOG=1 as "HLE-ENTRY ... src=BB:AAAA", and by AR_MUSICLOG=1 at each
# song start). While a replacement streams, the SPC driver still runs
# authentically — its per-song instrument voices are muted at the DSP, so
# sound effects (common sample bank) are untouched.
#
# Keys:
#   src         song identity: SPC image source as BB:AAAA (hex), required
#   file        OGG Vorbis file, relative to this manifest, required
#   song        driver song number the play command names (default: any)
#   loop        1 (default) loop forever; 0 play once
#   loop_start  loop restart point in sample frames (of the file's rate)
#   loop_end    frame the loop jumps back at (default: end of file)
#               When loop_start/loop_end are omitted, LOOPSTART/LOOPLENGTH
#               (or LOOPEND) Vorbis comment tags in the file are honored;
#               otherwise the whole file repeats.
#   gain        playback volume percent (default 100)
#   when        same gate grammar as graphics entries, evaluated at the
#               moment the song starts — entries sharing a src are tried in
#               manifest order and the first whose gates pass wins, so put
#               gated variants above an ungated fallback.

# -- Title-screen logo ---------------------------------------------------
# The logo/medallion/TM block. The whole title is one Mode-7 BG1 canvas;
# the gate waits for the intro swirl's per-scanline HDMA matrix animation
# to land on the identity matrix, so the swirl itself stays authentic and
# the HD art takes over on the settled frame. Menu text (y>=140) is outside
# the rect and never captured. Art aspect should be ~2.9:1 (the rect's
# display-space shape under the 7:6 CRT pixel stretch).
[replace:title-logo]
plane = screen
layer = bg1
rect = 11,27,248,122
image = hd/title-logo.png
when = wram[0018]==0x00, wram[0019]==0x00, mode==7, m7==identity

# -- Title-screen intro swirl ---------------------------------------------
# Same artwork riding the Mode-7 warp during the intro animation (the
# screen-plane entry above takes over on the settled identity-matrix frame,
# where a direct viewport blit is sharpest). Canvas rect measured from the
# AR_M7_DUMP capture: the logo block sits at canvas (139,156)-(376,251),
# i.e. the screen rect offset by the title's fixed 128/129 Mode-7 scroll.
[replace:title-swirl]
plane = mode7
canvas_rect = 139,156,376,251
image = hd/title-logo.png
when = wram[0018]==0x00, wram[0019]==0x00, mode==7, m7!=identity

# -- Title theme -----------------------------------------------------------
# The music that plays over the title screen and intro. Song 7 of the ROM's
# 17-entry song table at $02:C7E5; verified live via AR_APULOG boot capture
# (upload at f=6, play command $01 at f=9).
[music:title-theme]
src = 1A:94B8
file = audio/title.ogg

# -- Soundtrack census -------------------------------------------------------
# The remaining 16 entries of the $02:C7E5 song table, shipped inert until
# their audio exists. The table index is baked into each name; rename an
# entry once you identify the track (start the run with AR_MUSICLOG=1 — each
# song change logs "src=BB:AAAA song=NN", which matches the src here).
# A few additional songs arrive via inline script pointers rather than this
# table; the same log line identifies those srcs for new entries.
[music:song-00]
