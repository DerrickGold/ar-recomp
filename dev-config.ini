# dev-config.ini — development config: base settings + auto-enabled debug flags
# and cheats. Run with:  ./build/ActRaiserRecomp ar.sfc --config dev-config.ini
# (--config REPLACES the default config.ini load, so this file carries the base
# [Sound]/[Graphics] settings too.) Any AR_*/SNESREF_* key below is exported to
# the environment (config.c bridge), so every getenv()-based flag/cheat reads it.
# A command-line env var still overrides a value here (env > config) — handy to
# flip one off without editing the file, e.g.  env AR_INF_HP=0 ./build/... --config dev-config.ini

[General]
Autosave = 0
SkipLauncher = 1

[Graphics]
WindowScale = 3
NewRenderer = 1
NoSpriteLimits = 1

[Sound]
EnableAudio = 1
AudioFreq = 32040
AudioChannels = 2
AudioSamples = 512

# ── Cheats (speedrun testing kit; see docs/SEAMS.md) ────────────────────────
[Cheats]
AR_INF_HP = 1          # infinite health (pins player HP $1D)
AR_FREEZE_TIMER = 0    # freeze the action-stage timer $E6/$E7
AR_MOONJUMP = 1        # hold B (jump) to fly up; AR_MOONJUMP=<n> sets px/frame
AR_NO_KNOCKBACK = 1    # permanent i-frames -> no damage/knockback/hitstun
# AR_WARP = 0101       # F6 warp target: <region_hex><act_hex> (default 0101 = Fillmore act 1)

# ── Debug flags (see DEBUG.md). Uncomment as needed. ────────────────────────
[Debug]
# [garbage-variant] + [dispatch-miss] tripwires are default-ON (no flag needed).
# AR_GARBAGE_STACK = 1     # add recomp call stack + block ring to garbage-variant hits
# AR_GARBAGE_ABORT = 1     # abort on the first garbage-variant hit (freeze state at the leak)
# AR_MXHIST = 1            # per-PC m/x histogram + live misdecode trap
# AR_SCHECK = 1            # SNES stack-pointer corruption tracer
# AR_STACKPROV = 1         # stack pusher-provenance: on a bad-RTS / dispatch-miss,
#                          #   names who pushed the corrupt return frame, or flags
#                          #   NEVER-PUSHED (= wrong-S relocation, not a bad push)
# AR_PPULOG = 1            # per-frame bgmode/brightness/layers/hdmaen
# AR_FRAMELOG = 1          # per-frame mode/timer/HP/callsite
# AR_TRAPFN = bank_03_AC8E_M1X0   # dump call stack + block path on entry to a named variant
# AR_RTSLOG = 0x039b59     # trace an RTS site's dispatch chain
