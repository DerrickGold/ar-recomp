AR_WATCHOBJ = b30          # 2026-07-02 VERIFY the D04E-family fix: after regen, record 2 ($0B30)
                           #   should now receive position/script/sprite writes (+00..+09) from
                           #   the battery handlers (bank_01_BA18/BE78/... via bank_01_D072) at
