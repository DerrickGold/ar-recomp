# dev-config.ini — development config: base settings + auto-enabled debug flags
# and cheats. Run with:  ./build/ActRaiserRecomp ar.sfc --config dev-config.ini
# (--config REPLACES the default config.ini load, so this file carries the base
# [Sound]/[Graphics] settings too.) Any AR_*/SNESREF_* key below is exported to
# the environment (config.c bridge), so every getenv()-based flag/cheat reads it.
# A command-line env var still overrides a value here (env > config) — handy to
# flip one off without editing the file, e.g.  env AR_INF_HP=0 ./build/... --config dev-config.ini

[General]
Autosave = 0
SkipLauncher = 1

[Graphics]
WindowScale = 3
NewRenderer = 1
NoSpriteLimits = 1

[Sound]
EnableAudio = 1
AudioFreq = 32040
AudioChannels = 2
AudioSamples = 512

# ── Cheats (speedrun testing kit; see docs/SEAMS.md) ────────────────────────
[Cheats]
AR_INF_HP = 0          # infinite health (pins player HP $1D)
AR_FREEZE_TIMER = 0    # freeze the action-stage timer $E6/$E7 (now backs off automatically on a boss-defeat drain, see actraiser_rtl.c -- ON to verify that)
AR_MOONJUMP = 0        # hold B (jump) to fly up; AR_MOONJUMP=<n> sets px/frame
AR_NO_KNOCKBACK = 1    # permanent i-frames -> no damage/knockback/hitstun
# AR_WARP = 0101       # F6 warp target: <region_hex><act_hex> (default 0101 = Fillmore act 1)

# ── Debug flags (see DEBUG.md). Uncomment as needed. ────────────────────────
[Debug]
# [garbage-variant] + [dispatch-miss] tripwires are default-ON (no flag needed).
AR_TRACE_WATCH = saves/anom  # ALWAYS-ON anomaly capture (DEBUG.md §2 AR_TRACE): rolling ring of
                             # trace lines; auto-dumps saves/anom_hf<frame>_<kind><n>.jsonl on a
                             # tripwire-hidden dispatch-miss (S<$0200), garbage-variant, m/x leak,
                             # or watchdog hang. Then: tools/trace_slice.py <dump> --diagnose.
                             # Knobs: AR_TRACE_RING (4096) / AR_TRACE_POST (400) / AR_TRACE_CH.
                             # NOTE: mutually exclusive with a windowed AR_TRACE=<file> capture —
                             # if you set AR_TRACE in the env for a targeted run, watch mode is
                             # skipped for that run automatically (env > config precedence).
# AR_GARBAGE_STACK = 1     # add recomp call stack + block ring to garbage-variant hits
# AR_GARBAGE_ABORT = 1     # abort on the first garbage-variant hit (freeze state at the leak)
AR_MXHIST = 1              # per-PC m/x histogram + live misdecode trap (run this FIRST, always cheap)
AR_MXCHECK = 1             # entry m/x invariant (permanent regression guard, cheap)
AR_CALLMX = 1              # per-call-site m/x invariant (narrower than AR_MXCHECK's entry-only check)
# AR_MXCHECK_BT = bank_01_B898   # real host backtrace() on the first AR_MXCHECK failure matching <fn>
# AR_INDIRLOG = 1          # inspect suppressed JSR (abs,X) sites: WRAM table / HW-reg decode-artifact / ROM table
# AR_SCHECK = 1            # SNES stack-pointer corruption tracer
# AR_STACKPROV = 1         # stack pusher-provenance: on a bad-RTS / dispatch-miss,
#                          #   names who pushed the corrupt return frame, or flags
#                          #   NEVER-PUSHED (= wrong-S relocation, not a bad push)
# AR_PPULOG = 1            # per-frame bgmode/brightness/layers/hdmaen
# AR_FRAMELOG = 1          # per-frame mode/timer/HP/callsite/joypad
# AR_SIMTRACE = 1          # sim-mode dispatch path watcher: skip-vs-continue past $01:8000 (ruled out)
# AR_WATCH18 = 1           # trace $18 mode-byte transitions
# AR_TRAPFN = bank_03_AC8E_M1X0   # dump call stack + block path on entry to a named variant
# AR_RTSLOG = 0x039b59     # trace an RTS site's dispatch chain
# AR_WATCHOBJ = 197da     # RESOLVED: $7F:97DA staging = faithful SRAM restore (bank_03_A83A);
                           #   save file genuinely blank there -> not the origin. See DEBUG.md #16.
# AR_WATCHOBJ = b30       # DONE: proved NOTHING ever writes the broken records except the
                           #   SRAM-restore (813F) + hide-sweep (CFB3). See DEBUG.md.
# AR_WATCHOBJ = af4       # DONE: found the refresh chain 8029 -> B1C7 -> CFF2($033C param)/AC70.
# AR_WATCHOBJ = 33c       # DONE: sweep protocol decoded (AA56->CFF2->AC36 per stride-12 process,
                           #   id from +0E, sub from $033D). Ours DOES issue list $1C for process
                           #   $0742 (f=751/950) -> script $A3E5 assigned. See DEBUG.md #20.
# AR_WATCHOBJ = 742       # DONE: process layer proven healthy end-to-end (DEBUG.md #21);
                           #   $A4C5 was benign (B52F switch-variant pass).
# AR_WATCHOBJ = b30       # DONE (dump16): F5BE fix confirmed correct (census: F621/F671/F68A
                           #   all firing 53x, matching F5BE's own count; [call-mx] $0381EB gone;
                           #   oracle-matching writes to $7F:9101/9102/910A/913A/914F). Records
                           #   STILL never populate here -- fix was necessary but not sufficient.
                           #   Root cause reframed in DEBUG.md #24: the real oracle spawn event
                           #   (f=901) is a single 322-write ONE-SHOT burst spanning the stack page
