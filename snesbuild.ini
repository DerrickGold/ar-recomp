# snesbuild.ini — game-side build manifest for snesbuild's hermetic
# (CMake-free) build path: `snesbuild build --hermetic`.
#
# This lists only what the engine cannot know about this game. The shared
# runtime source list lives in snesrecomp-go/runtime/runner.cmake (parsed
# directly by snesbuild), and generated sources are globbed from src/gen.
# CMakeLists.txt remains the developer build; keep its game source list and
# this file in sync — `snesbuild doctor` cross-checks the two.

[project]
name = ActRaiserRecomp
std = c11
sdl2 = true
link = -lm

define = SYSTEM_VOLUME_MIXER_AVAILABLE=0
define = SNESRECOMP_TRACE=0
define = SNESRECOMP_REVERSE_DEBUG=0

include = .
include = src
include = recomp
include = third_party/stb

source = src/config.c
source = src/settings.c
source = src/settings_overlay.c
source = src/scene_inspector.c
source = src/scene_asset_dump.c
source = src/save_system.c
source = src/run_dir.c
source = src/main.c
source = src/actraiser_00.c
source = src/gen_stubs.c
source = src/actraiser_cpu_infra.c
source = src/actraiser_rtl.c
source = src/hd_replacements.c
source = src/music_replacements.c
source = third_party/stb/stb_vorbis.c
source = src/hd_tile_census.c
source = src/actraiser_widescreen_bg.c
source = src/actraiser_widescreen_sprites.c
source = src/actraiser_bugfixes.c
source = src/actraiser_spc_player.c
